<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>シスタン-設定</title>
        <link rel="stylesheet" href="set_styles.css">
        <link rel="stylesheet" href="../reset.css">
        <script src="set.js" defer></script>
    </head>
    <body>
        <header>
            <ul>
                <li>[英単語]ステージ１</li>
                <li>[英単語]ステージ２</li>
                <li>[英単語]ステージ３</li>
                <li>[英単語]ステージ４</li>
            </ul>
        </header>        
        <div class="block">
            <div class="summary">
                <div class="problem_number">
                    <img src="../imgs/systan.png" alt="">
                    <h4>[英単語] 1～20<br><meter value="100" min="0" max="100" class = "meter"></meter>100%</h4>
                </div>
                <div class="stage">
                    <h5>[英単語]ステージ１<span class = "lebel_span">　(Lebel-1)</span></h5>
                </div>
            </div>
            <div class="buttons">
                <button class = "learn_button" data-number="1" style="background-color: blue; border-radius: 0 20px 0 0;">学習</button>
                <button class = "list_button" data-number="1" style="background-color: orange; border-radius: 0 0 20px 0;">一覧</button>
            </div>
        </div>
        <div class="block">
            <div class="summary">
                <div class="problem_number">
                    <img src="../imgs/systan.png" alt="">
                    <h4>[英単語] 21～40<br><meter value="0" min="0" max="100" class = "meter"></meter>0%</h4>
                </div>
                <div class="stage">
                    <h5>[英単語]ステージ１<span class = "lebel_span">　(Lebel-2)</span></h5>
                </div>
            </div>
            <div class="buttons">
                <button class = "learn_button" data-number = "2" style="background-color: blue; border-radius: 0 20px 0 0;">学習</button>
                <button class = "list_button" data-number = "2" style="background-color: orange; border-radius: 0 0 20px 0;">一覧</button>
            </div>
        </div>
    </body>
</html>
